name: Deploy Worker

# Auto-deploy the podcast-together-api Worker on every push to main that
# touches workers/**. Reuses the same repo secrets as deploy-pages.yml:
#   CLOUDFLARE_API_TOKEN  - must ALSO have "Workers Scripts: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
